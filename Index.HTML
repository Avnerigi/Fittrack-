<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="FitTrack">
    <title>FitTrack - מעקב אימונים</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6C63FF;
            --primary-dark: #5A52D5;
            --primary-light: #8B85FF;
            --secondary: #FF6B6B;
            --success: #4ECB71;
            --warning: #FFB84D;
            --bg: #0F0F1A;
            --bg-card: #1A1A2E;
            --bg-card-2: #222240;
            --bg-input: #2A2A4A;
            --text: #FFFFFF;
            --text-secondary: #A0A0C0;
            --text-muted: #6060A0;
            --border: #333360;
            --shadow: rgba(0, 0, 0, 0.3);
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            overflow-x: hidden;
        }

        html {
            height: -webkit-fill-available;
        }

        .screen {
            display: none;
            min-height: 100vh;
            padding-top: calc(var(--safe-top) + 10px);
            padding-bottom: calc(var(--safe-bottom) + 100px);
            animation: fadeIn 0.3s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes checkmark {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .header-btn {
            background: var(--bg-card-2);
            border: 1px solid var(--border);
            color: var(--text);
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:active {
            transform: scale(0.92);
            background: var(--primary);
        }

        /* Home */
        .home-greeting {
            padding: 20px 25px;
            margin-bottom: 10px;
        }

        .home-greeting .date {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .home-greeting h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .home-cards {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .home-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px 24px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .home-card:active {
            transform: scale(0.97);
        }

        .home-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            opacity: 0.1;
            transform: translate(30px, -30px);
        }

        .home-card.workout::before { background: var(--primary); }
        .home-card.meals::before { background: var(--secondary); }

        .home-card .card-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }

        .home-card .card-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .home-card .card-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .home-card .card-progress {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--bg-input);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .home-card.workout .fill {
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
        }

        .home-card.meals .fill {
            background: linear-gradient(90deg, var(--secondary), #FF9B9B);
        }

        .progress-text {
            font-size: 13px;
            color: var(--text-secondary);
            min-width: 40px;
            text-align: left;
        }

        /* Day Indicator */
        .day-indicator {
            text-align: center;
            padding: 10px 20px 20px;
        }

        .day-indicator .day-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-light);
        }

        /* Exercise List */
        .exercise-list {
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .exercise-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px 20px;
            animation: slideUp 0.3s ease both;
        }

        .exercise-card:nth-child(1) { animation-delay: 0.05s; }
        .exercise-card:nth-child(2) { animation-delay: 0.1s; }
        .exercise-card:nth-child(3) { animation-delay: 0.15s; }
        .exercise-card:nth-child(4) { animation-delay: 0.2s; }
        .exercise-card:nth-child(5) { animation-delay: 0.25s; }
        .exercise-card:nth-child(6) { animation-delay: 0.3s; }
        .exercise-card:nth-child(7) { animation-delay: 0.35s; }
        .exercise-card:nth-child(8) { animation-delay: 0.4s; }

        .exercise-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .exercise-sets {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .set-btn {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--bg-input);
            color: var(--text);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .set-btn:active { transform: scale(0.9); }

        .set-btn.done {
            background: var(--success);
            border-color: var(--success);
            color: white;
            animation: checkmark 0.3s ease;
        }

        .set-btn.done::after {
            content: '✓';
            font-size: 18px;
        }

        .set-btn.done span { display: none; }

        .exercise-card.all-done {
            border-color: var(--success);
            background: rgba(78, 203, 113, 0.08);
        }

        .exercise-card.all-done .exercise-name {
            color: var(--success);
        }

        /* Meals */
        .meal-section {
            padding: 0 20px;
            margin-bottom: 16px;
        }

        .meal-section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            padding: 8px 4px;
        }

        .meal-items {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .meal-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: all 0.2s;
            animation: slideUp 0.3s ease both;
        }

        .meal-item:active { transform: scale(0.98); }

        .meal-checkbox {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .meal-item.done .meal-checkbox {
            background: var(--success);
            border-color: var(--success);
        }

        .meal-item.done .meal-checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .meal-text {
            font-size: 16px;
            transition: all 0.2s;
        }

        .meal-item.done .meal-text {
            color: var(--text-muted);
            text-decoration: line-through;
            text-decoration-color: var(--text-muted);
            text-decoration-thickness: 2px;
        }

        /* Edit Screens */
        .edit-container {
            padding: 0 20px;
        }

        .day-tabs {
            display: flex;
            gap: 6px;
            padding: 0 20px 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .day-tabs::-webkit-scrollbar { display: none; }

        .day-tab {
            padding: 10px 16px;
            border-radius: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .day-tab:active { transform: scale(0.95); }

        .day-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .edit-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .edit-item input[type="text"] {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .edit-item input::placeholder {
            color: var(--text-muted);
        }

        .sets-input {
            width: 60px;
            text-align: center;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .delete-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 107, 107, 0.15);
            border: none;
            color: var(--secondary);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .delete-btn:active {
            background: var(--secondary);
            color: white;
        }

        .add-btn {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 2px dashed var(--border);
            background: none;
            color: var(--text-secondary);
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }

        .add-btn:active {
            border-color: var(--primary);
            color: var(--primary);
            background: rgba(108, 99, 255, 0.08);
        }

                .save-btn {
            width: calc(100% - 40px);
            margin: 24px 20px;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-size: 17px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-btn:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        /* Meal Edit */
        .meal-type-header {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary-light);
            margin: 16px 0 8px;
        }

        .meal-type-header:first-child {
            margin-top: 0;
        }

        .meal-edit-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meal-edit-item input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .meal-edit-item input::placeholder {
            color: var(--text-muted);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .empty-state button {
            padding: 12px 28px;
            border-radius: 14px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }

        /* No exercises for today */
        .rest-day {
            text-align: center;
            padding: 60px 40px;
        }

        .rest-day .rest-icon {
            font-size: 72px;
            margin-bottom: 16px;
            display: block;
        }

        .rest-day h3 {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .rest-day p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: calc(var(--safe-bottom) + 30px);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 14px 28px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            z-index: 1000;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Confirm Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px 24px;
            max-width: 320px;
            width: 100%;
            text-align: center;
        }

        .modal h3 {
            font-size: 20px;
            margin-bottom: 10px;
        }

        .modal p {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 24px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
        }

        .modal-btn.cancel {
            background: var(--bg-input);
            color: var(--text);
        }

        .modal-btn.confirm {
            background: var(--secondary);
            color: white;
        }

        /* Reset daily button */
        .reset-section {
            padding: 30px 20px 10px;
            text-align: center;
        }

        .reset-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
        }

        .reset-btn:active {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
        }
    </style>
</head>
<body>

<!-- HOME SCREEN -->
<div id="homeScreen" class="screen active">
    <div class="header">
        <h1>💪 FitTrack</h1>
        <div class="header-actions">
        </div>
    </div>
    <div class="home-greeting">
        <div class="date" id="homeDate"></div>
        <h2 id="homeGreeting">בוקר טוב! 👋</h2>
    </div>
    <div class="home-cards">
        <div class="home-card workout" onclick="showScreen('workout')">
            <span class="card-icon">🏋️</span>
            <div class="card-title">תוכנית אימון</div>
            <div class="card-subtitle" id="workoutSubtitle">לחץ כדי לראות את האימון של היום</div>
            <div class="card-progress">
                <div class="progress-bar"><div class="fill" id="workoutProgress" style="width:0%"></div></div>
                <span class="progress-text" id="workoutProgressText">0%</span>
            </div>
        </div>
        <div class="home-card meals" onclick="showScreen('meals')">
            <span class="card-icon">🥗</span>
            <div class="card-title">תפריט ארוחות</div>
            <div class="card-subtitle" id="mealsSubtitle">לחץ כדי לראות את הארוחות של היום</div>
            <div class="card-progress">
                <div class="progress-bar"><div class="fill" id="mealsProgress" style="width:0%"></div></div>
                <span class="progress-text" id="mealsProgressText">0%</span>
            </div>
        </div>
    </div>
</div>

<!-- WORKOUT SCREEN -->
<div id="workoutScreen" class="screen">
    <div class="header">
        <h1>🏋️ אימון</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="showScreen('editWorkout')" title="ערוך">✏️</button>
            <button class="header-btn" onclick="showScreen('home')" title="חזרה">🏠</button>
        </div>
    </div>
    <div class="day-indicator">
        <div class="day-name" id="workoutDayName"></div>
    </div>
    <div id="exerciseList" class="exercise-list"></div>
    <div class="reset-section">
        <button class="reset-btn" onclick="confirmReset('workout')">🔄 אפס סימונים של היום</button>
    </div>
</div>

<!-- MEALS SCREEN -->
<div id="mealsScreen" class="screen">
    <div class="header">
        <h1>🥗 ארוחות</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="showScreen('editMeals')" title="ערוך">✏️</button>
            <button class="header-btn" onclick="showScreen('home')" title="חזרה">🏠</button>
        </div>
    </div>
    <div class="day-indicator">
        <div class="day-name" id="mealsDayName"></div>
    </div>
    <div id="mealsList"></div>
    <div class="reset-section">
        <button class="reset-btn" onclick="confirmReset('meals')">🔄 אפס סימונים של היום</button>
    </div>
</div>

<!-- EDIT WORKOUT SCREEN -->
<div id="editWorkoutScreen" class="screen">
    <div class="header">
        <h1>✏️ עריכת אימונים</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="showScreen('workout')" title="חזרה">✕</button>
        </div>
    </div>
    <div class="day-tabs" id="editWorkoutTabs"></div>
    <div class="edit-container" id="editWorkoutContainer"></div>
    <button class="add-btn" style="margin:4px 20px;width:calc(100% - 40px)" onclick="addExerciseField()">+ הוסף תרגיל</button>
    <button class="save-btn" onclick="saveWorkoutPlan()">💾 שמור תוכנית</button>
</div>

<!-- EDIT MEALS SCREEN -->
<div id="editMealsScreen" class="screen">
    <div class="header">
        <h1>✏️ עריכת ארוחות</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="showScreen('meals')" title="חזרה">✕</button>
        </div>
    </div>
    <div class="edit-container" id="editMealsContainer"></div>
    <button class="save-btn" onclick="saveMealsPlan()">💾 שמור תפריט</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal">
        <h3>🔄 איפוס סימונים</h3>
        <p>בטוח שאתה רוצה לאפס את כל הסימונים של היום?</p>
        <div class="modal-buttons">
            <button class="modal-btn cancel" onclick="closeModal()">ביטול</button>
            <button class="modal-btn confirm" id="confirmResetBtn">אפס</button>
        </div>
    </div>
</div>

<script>
    // ========== DATA ==========
    const DAYS = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
    const MEAL_TYPES = ['ארוחת בוקר', 'ארוחת ביניים', 'ארוחת צהריים', 'ארוחת ביניים 2', 'ארוחת ערב'];

    function getToday() {
        return new Date().getDay(); // 0=Sunday
    }

    function getTodayKey() {
        return new Date().toISOString().split('T')[0];
    }

    function getDayName(idx) {
        return DAYS[idx];
    }

    // ========== STORAGE ==========
    function loadData(key, fallback) {
        try {
            const d = localStorage.getItem(key);
            return d ? JSON.parse(d) : fallback;
        } catch { return fallback; }
    }

    function saveData(key, val) {
        localStorage.setItem(key, JSON.stringify(val));
    }

    // workout plan: { "0": [{name, sets}], "1": [...], ... }
    function getWorkoutPlan() {
        return loadData('workoutPlan', {});
    }

    function setWorkoutPlan(plan) {
        saveData('workoutPlan', plan);
    }

    // meals plan: { mealType: [item, item, ...], ... }
    function getMealsPlan() {
        return loadData('mealsPlan', {});
    }

    function setMealsPlan(plan) {
        saveData('mealsPlan', plan);
    }

    // daily workout progress: { "2025-01-15": { "0": [true,false,true], "1": [...] } }
    function getWorkoutDone() {
        return loadData('workoutDone', {});
    }

    function setWorkoutDone(data) {
        saveData('workoutDone', data);
    }

    // daily meals progress: { "2025-01-15": { "ארוחת בוקר": [true, false], ... } }
    function getMealsDone() {
        return loadData('mealsDone', {});
    }

    function setMealsDone(data) {
        saveData('mealsDone', data);
    }

    // ========== SCREEN NAV ==========
    function showScreen(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const screenEl = document.getElementById(name + 'Screen');
        if (screenEl) {
            screenEl.classList.add('active');
            window.scrollTo(0, 0);
        }

        if (name === 'home') renderHome();
        else if (name === 'workout') renderWorkout();
        else if (name === 'meals') renderMeals();
        else if (name === 'editWorkout') renderEditWorkout();
        else if (name === 'editMeals') renderEditMeals();
    }

    // ========== HOME ==========
    function renderHome() {
        const now = new Date();
        const dayIdx = getToday();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('homeDate').textContent = now.toLocaleDateString('he-IL', options);

        const hour = now.getHours();
        let greet = 'ערב טוב! 🌙';
        if (hour < 12) greet = 'בוקר טוב! ☀️';
        else if (hour < 17) greet = 'צהריים טובים! 🌤';
        else if (hour < 21) greet = 'אחר צהריים טובים! 🌇';
        document.getElementById('homeGreeting').textContent = greet;

        // Workout progress
        const plan = getWorkoutPlan();
        const todayExercises = plan[dayIdx] || [];
        const todayKey = getTodayKey();
        const wDone = getWorkoutDone();
        const todayWDone = wDone[todayKey] || {};

        let totalSets = 0, doneSets = 0;
        todayExercises.forEach((ex, i) => {
            totalSets += ex.sets;
            const arr = todayWDone[i] || [];
            doneSets += arr.filter(Boolean).length;
        });

        const wPct = totalSets > 0 ? Math.round((doneSets / totalSets) * 100) : 0;
        document.getElementById('workoutProgress').style.width = wPct + '%';
        document.getElementById('workoutProgressText').textContent = wPct + '%';

        if (todayExercises.length === 0) {
            document.getElementById('workoutSubtitle').textContent = 'אין אימון מוגדר להיום';
        } else {
            document.getElementById('workoutSubtitle').textContent = todayExercises.length + ' תרגילים · ' + doneSets + '/' + totalSets + ' סטים';
        }

        // Meals progress
        const mPlan = getMealsPlan();
        const mDone = getMealsDone();
        const todayMDone = mDone[todayKey] || {};

        let totalMeals = 0, doneMeals = 0;
        MEAL_TYPES.forEach(type => {
            const items = mPlan[type] || [];
            totalMeals += items.length;
            const arr = todayMDone[type] || [];
            doneMeals += arr.filter(Boolean).length;
        });

        const mPct = totalMeals > 0 ? Math.round((doneMeals / totalMeals) * 100) : 0;
        document.getElementById('mealsProgress').style.width = mPct + '%';
        document.getElementById('mealsProgressText').textContent = mPct + '%';

        if (totalMeals === 0) {
            document.getElementById('mealsSubtitle').textContent = 'אין תפריט מוגדר';
        } else {
            document.getElementById('mealsSubtitle').textContent = doneMeals + '/' + totalMeals + ' פריטים בוצעו';
        }
    }

    // ========== WORKOUT SCREEN ==========
    function renderWorkout() {
        const dayIdx = getToday();
        document.getElementById('workoutDayName').textContent = 'יום ' + getDayName(dayIdx);

        const plan = getWorkoutPlan();
        const exercises = plan[dayIdx] || [];
        const container = document.getElementById('exerciseList');

        if (exercises.length === 0) {
            container.innerHTML = `
                <div class="rest-day">
                    <span class="rest-icon">😴</span>
                    <h3>אין אימון היום</h3>
                    <p>יום מנוחה או שלא הוגדרה תוכנית</p>
                    <br>
                    <button class="save-btn" style="width:auto;display:inline-block;margin:0;padding:12px 28px;font-size:15px" onclick="showScreen('editWorkout')">➕ הוסף תוכנית</button>
                </div>`;
            return;
        }

        const todayKey = getTodayKey();
        const wDone = getWorkoutDone();
        const todayWDone = wDone[todayKey] || {};

        let html = '';
        exercises.forEach((ex, exIdx) => {
            const setsDone = todayWDone[exIdx] || new Array(ex.sets).fill(false);
            // Pad if needed
            while (setsDone.length < ex.sets) setsDone.push(false);

            const allDone = setsDone.slice(0, ex.sets).every(Boolean);

            html += `<div class="exercise-card ${allDone ? 'all-done' : ''}">
                <div class="exercise-name">${escapeHtml(ex.name)}</div>
                <div class="exercise-sets">`;

            for (let s = 0; s < ex.sets; s++) {
                html += `<button class="set-btn ${setsDone[s] ? 'done' : ''}" onclick="toggleSet(${exIdx}, ${s}, ${ex.sets})">
                    <span>${s + 1}</span>
                </button>`;
            }

            html += `</div></div>`;
        });

        container.innerHTML = html;
    }

    function toggleSet(exIdx, setIdx, totalSets) {
        const todayKey = getTodayKey();
        const wDone = getWorkoutDone();
        if (!wDone[todayKey]) wDone[todayKey] = {};
        if (!wDone[todayKey][exIdx]) wDone[todayKey][exIdx] = new Array(totalSets).fill(false);

        while (wDone[todayKey][exIdx].length < totalSets) wDone[todayKey][exIdx].push(false);

        wDone[todayKey][exIdx][setIdx] = !wDone[todayKey][exIdx][setIdx];
        setWorkoutDone(wDone);
        renderWorkout();
    }

    // ========== MEALS SCREEN ==========
    function renderMeals() {
        const dayIdx = getToday();
        document.getElementById('mealsDayName').textContent = 'יום ' + getDayName(dayIdx);

        const mPlan = getMealsPlan();
        const todayKey = getTodayKey();
        const mDone = getMealsDone();
        const todayMDone = mDone[todayKey] || {};

        const container = document.getElementById('mealsList');

        let hasAny = false;
        let html = '';
        let animIdx = 0;

        MEAL_TYPES.forEach(type => {
            const items = mPlan[type] || [];
            if (items.length === 0) return;
            hasAny = true;

            const doneArr = todayMDone[type] || new Array(items.length).fill(false);

            html += `<div class="meal-section">
                <div class="meal-section-title">${escapeHtml(type)}</div>
                <div class="meal-items">`;

            items.forEach((item, idx) => {
                const isDone = doneArr[idx] || false;
                html += `<div class="meal-item ${isDone ? 'done' : ''}" onclick="toggleMeal('${type}', ${idx}, ${items.length})" style="animation-delay:${animIdx * 0.05}s">
                    <div class="meal-checkbox"></div>
                    <div class="meal-text">${escapeHtml(item)}</div>
                </div>`;
                animIdx++;
            });

            html += `</div></div>`;
        });

        if (!hasAny) {
            html = `<div class="rest-day">
                <span class="rest-icon">🍽️</span>
                <h3>אין תפריט מוגדר</h3>
                <p>הוסף ארוחות כדי לעקוב</p>
                <br>
                <button class="save-btn" style="width:auto;display:inline-block;margin:0;padding:12px 28px;font-size:15px" onclick="showScreen('editMeals')">➕ הוסף תפריט</button>
            </div>`;
        }

        container.innerHTML = html;
    }

    function toggleMeal(type, idx, total) {
        const todayKey = getTodayKey();
        const mDone = getMealsDone();
        if (!mDone[todayKey]) mDone[todayKey] = {};
        if (!mDone[todayKey][type]) mDone[todayKey][type] = new Array(total).fill(false);

        while (mDone[todayKey][type].length < total) mDone[todayKey][type].push(false);

        mDone[todayKey][type][idx] = !mDone[todayKey][type][idx];
        setMealsDone(mDone);
        renderMeals();
    }

    // ========== EDIT WORKOUT ==========
    let editingDay = 0;

    function renderEditWorkout() {
        editingDay = getToday();
        renderEditWorkoutTabs();
        renderEditWorkoutFields();
    }

    function renderEditWorkoutTabs() {
        let html = '';
        DAYS.forEach((name, idx) => {
            html += `<div class="day-tab ${idx === editingDay ? 'active' : ''}" onclick="switchEditDay(${idx})">${name}</div>`;
        });
        document.getElementById('editWorkoutTabs').innerHTML = html;
    }

    function switchEditDay(idx) {
        editingDay = idx;
        renderEditWorkoutTabs();
        renderEditWorkoutFields();
    }

    function renderEditWorkoutFields() {
        const plan = getWorkoutPlan();
        const exercises = plan[editingDay] || [];
        const container = document.getElementById('editWorkoutContainer');

        let html = '';
        if (exercises.length === 0) {
            html += `<div style="text-align:center;padding:20px;color:var(--text-muted)">
                <p>אין תרגילים ליום ${getDayName(editingDay)}</p>
            </div>`;
        }

        exercises.forEach((ex, idx) => {
            html += `<div class="edit-item" id="exField_${idx}">
                <input type="text" value="${escapeHtml(ex.name)}" placeholder="שם תרגיל" class="ex-name-input" data-idx="${idx}">
                <input type="number" class="sets-input ex-sets-input" value="${ex.sets}" min="1" max="20" placeholder="סטים" data-idx="${idx}">
                <button class="delete-btn" onclick="removeExerciseField(${idx})">🗑</button>
            </div>`;
        });

        container.innerHTML = html;
    }

    function addExerciseField() {
        const plan = getWorkoutPlan();
        if (!plan[editingDay]) plan[editingDay] = [];
        plan[editingDay].push({ name: '', sets: 3 });
        setWorkoutPlan(plan);
        renderEditWorkoutFields();

        // Focus on new field
        setTimeout(() => {
            const inputs = document.querySelectorAll('.ex-name-input');
            if (inputs.length > 0) inputs[inputs.length - 1].focus();
        }, 100);
    }

    function removeExerciseField(idx) {
        const plan = getWorkoutPlan();
        if (plan[editingDay]) {
            plan[editingDay].splice(idx, 1);
            setWorkoutPlan(plan);
            renderEditWorkoutFields();
        }
    }

    function saveWorkoutPlan() {
        const plan = getWorkoutPlan();
        const names = document.querySelectorAll('.ex-name-input');
        const sets = document.querySelectorAll('.ex-sets-input');

        const exercises = [];
        names.forEach((inp, i) => {
            const name = inp.value.trim();
            const setsVal = parseInt(sets[i].value) || 3;
            if (name) {
                exercises.push({ name, sets: Math.max(1, Math.min(20, setsVal)) });
            }
        });

        plan[editingDay] = exercises;
        setWorkoutPlan(plan);
        showToast('✅ תוכנית האימון נשמרה!');
        showScreen('workout');
    }

    // ========== EDIT MEALS ==========
    function renderEditMeals() {
        const plan = getMealsPlan();
        const container = document.getElementById('editMealsContainer');

        let html = '';

        MEAL_TYPES.forEach(type => {
            const items = plan[type] || [];

            html += `<div class="meal-type-header">${escapeHtml(type)}</div>`;

            items.forEach((item, idx) => {
                html += `<div class="meal-edit-item">
                    <input type="text" value="${escapeHtml(item)}" placeholder="פריט מזון" class="meal-input" data-type="${type}" data-idx="${idx}">
                    <button class="delete-btn" onclick="removeMealItem('${type}', ${idx})">🗑</button>
                </div>`;
            });

            html += `<button class="add-btn" onclick="addMealItem('${type}')" style="margin-bottom:12px">+ הוסף פריט ל${type}</button>`;
        });

        container.innerHTML = html;
    }

    function addMealItem(type) {
        const plan = getMealsPlan();
        if (!plan[type]) plan[type] = [];
        plan[type].push('');
        setMealsPlan(plan);
        renderEditMeals();

        setTimeout(() => {
            const inputs = document.querySelectorAll(`.meal-input[data-type="${type}"]`);
            if (inputs.length > 0) inputs[inputs.length - 1].focus();
        }, 100);
    }

    function removeMealItem(type, idx) {
        const plan = getMealsPlan();
        if (plan[type]) {
            plan[type].splice(idx, 1);
            setMealsPlan(plan);
            renderEditMeals();
        }
    }

    function saveMealsPlan() {
        const plan = {};

        MEAL_TYPES.forEach(type => {
            const inputs = document.querySelectorAll(`.meal-input[data-type="${type}"]`);
            const items = [];
            inputs.forEach(inp => {
                const val = inp.value.trim();
                if (val) items.push(val);
            });
            if (items.length > 0) plan[type] = items;
        });

        setMealsPlan(plan);
        showToast('✅ תפריט הארוחות נשמר!');
        showScreen('meals');
    }

    // ========== RESET ==========
    let resetTarget = '';

    function confirmReset(target) {
        resetTarget = target;
        document.getElementById('confirmModal').classList.add('show');
        document.getElementById('confirmResetBtn').onclick = () => {
            executeReset();
            closeModal();
        };
    }

    function closeModal() {
        document.getElementById('confirmModal').classList.remove('show');
    }

    function executeReset() {
        const todayKey = getTodayKey();

        if (resetTarget === 'workout') {
            const wDone = getWorkoutDone();
            delete wDone[todayKey];
            setWorkoutDone(wDone);
            showToast('🔄 סימוני האימון אופסו');
            renderWorkout();
        } else if (resetTarget === 'meals') {
            const mDone = getMealsDone();
            delete mDone[todayKey];
            setMealsDone(mDone);
            showToast('🔄 סימוני הארוחות אופסו');
            renderMeals();
        }
    }

    // ========== TOAST ==========
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ========== UTILS ==========
    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // ========== CLEAN OLD DATA (older than 30 days) ==========
    function cleanOldData() {
        const now = new Date();
        const cutoff = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
        const cutoffKey = cutoff.toISOString().split('T')[0];

        ['workoutDone', 'mealsDone'].forEach(key => {
            const data = loadData(key, {});
            let changed = false;
            Object.keys(data).forEach(dateKey => {
                if (dateKey < cutoffKey) {
                    delete data[dateKey];
                    changed = true;
                }
            });
            if (changed) saveData(key, data);
        });
    }

    // ========== INIT ==========
    function init() {
        cleanOldData();
        renderHome();
    }

    // Run on load
    init();
</script>
</body>
</html>
